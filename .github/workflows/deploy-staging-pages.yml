name: Deploy staging Pages

on:
  push:
    branches:
      - staging

permissions:
  contents: write

concurrency:
  group: staging-pages
  cancel-in-progress: true

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Check out staging
        uses: actions/checkout@v4
        with:
          path: site

      - name: Publish staging subpath
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir pages
          cd pages
          git init
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git ls-remote --exit-code --heads origin gh-pages; then
            git fetch origin gh-pages
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . || true
          fi

          mkdir -p staging
          find staging -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          cp ../site/index.html staging/index.html
          cp ../site/ballot-photo.jpeg staging/ballot-photo.jpeg
          touch .nojekyll

          git add .nojekyll staging
          if git diff --cached --quiet; then
            echo "No staging Pages changes to publish."
            exit 0
          fi

          git commit -m "Deploy staging site"
          git push origin gh-pages
